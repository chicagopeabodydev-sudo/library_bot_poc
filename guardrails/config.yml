colang_version: "2.x"

models:
  - type: main
    engine: openai
    model: gpt-4o-mini
    api_key_env_var: OPENAI_API_KEY
    parameters:
      temperature: 0.0

instructions:
  - type: general
    content: |
      You are enforcing guardrails for a chatbot that answers questions about
      indexed library website content. Favor safe refusals over risky answers.
